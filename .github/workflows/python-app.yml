name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_script: build.ps1
            executable: main.exe
            run_script: run.bat
            artifact_name: app-windows
          - os: ubuntu-latest
            build_script: build.sh
            executable: main.bin
            run_script: run.sh
            artifact_name: app-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'          # 已固定为 3.11.9
          cache: 'pip'                      # 缓存 pip 依赖

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Grant execute permission (Linux)
        if: runner.os == 'Linux'
        run: chmod +x ${{ matrix.build_script }}

      - name: Run build script
        shell: pwsh
        run: |
          if ($env:Runner_OS -eq 'Windows') {
            & .\${{ matrix.build_script }}
          } else {
            bash ./${{ matrix.build_script }}
          }

      - name: Clean build folder (keep only executable)
        shell: pwsh
        run: |
          $buildDir = "build"
          if (Test-Path $buildDir) {
            Push-Location $buildDir
            Get-ChildItem -Exclude "${{ matrix.executable }}" | Remove-Item -Recurse -Force
            Pop-Location
          } else {
            Write-Error "build folder not found after build script"
            exit 1
          }

      - name: Copy wiki, run script and setting.yaml
        shell: pwsh
        run: |
          $buildDir = "build"
          # Copy wiki (entire folder)
          if (Test-Path "wiki") {
            Copy-Item -Path "wiki\*" -Destination $buildDir -Recurse -Force
          } else {
            Write-Warning "wiki folder not found, skipping"
          }
          # Copy run script
          if (Test-Path "${{ matrix.run_script }}") {
            Copy-Item -Path "${{ matrix.run_script }}" -Destination $buildDir -Force
          } else {
            Write-Warning "${{ matrix.run_script }} not found, skipping"
          }
          # Copy setting.yaml
          if (Test-Path "setting.yaml") {
            Copy-Item -Path "setting.yaml" -Destination $buildDir -Force
          } else {
            Write-Warning "setting.yaml not found, skipping"
          }

      - name: Package build folder as ZIP
        shell: pwsh
        run: |
          $zipName = "${{ matrix.artifact_name }}.zip"
          if ($env:Runner_OS -eq 'Windows') {
            Compress-Archive -Path ".\build\*" -DestinationPath $zipName -Force
          } else {
            # Linux uses zip command (install if needed)
            sudo apt-get update && sudo apt-get install -y zip
            zip -r $zipName build/
          }
          echo "ZIP created: $zipName"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 7
